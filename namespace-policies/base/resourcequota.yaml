apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-compute-quota
  labels:
    policy-type: baseline
    managed-by: argocd
spec:
  hard:
    # Compute resources
    requests.cpu: "4"           # 4 cores de CPU solicitados máximo
    requests.memory: 8Gi        # 8GB de RAM solicitados máximo
    limits.cpu: "8"             # 8 cores de CPU límite máximo
    limits.memory: 16Gi         # 16GB de RAM límite máximo
    # Objetos Kubernetes
    pods: "30"                  # máximo 30 pods en el namespace
    services: "20"
    persistentvolumeclaims: "10"
    secrets: "50"
    configmaps: "50"
    # OpenShift específico
    count/routes.route.openshift.io: "20"
    
Política 3: LimitRange (límites por container individual):
# demo/namespace-policies/base/limitrange.yaml
apiVersion: v1
kind: LimitRange
metadata:
  name: namespace-container-limits
  labels:
    policy-type: baseline
    managed-by: argocd
spec:
  limits:
  - type: Container
    # Defaults aplicados si el container no especifica requests/limits
    default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    # Rango permitido para requests y limits
    min:
      cpu: 50m
      memory: 64Mi
    max:
      cpu: "4"
      memory: 4Gi
  - type: Pod
    max:
      cpu: "8"
      memory: 8Gi
  - type: PersistentVolumeClaim
    max:
      storage: 50Gi
    min:
      storage: 1Gi
